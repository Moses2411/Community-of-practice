services:
  - type: web
    name: abu-cop-platform
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cop-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"

databases:
  - name: cop-db
    plan: free
